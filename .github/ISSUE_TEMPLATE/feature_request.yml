name: Feature request
description: Propose a change to LocalHold
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user or operator problem this would solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired behavior and public interface.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note existing workarounds or other designs you considered.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Identify configuration, MCP schema, storage, or platform compatibility implications.

