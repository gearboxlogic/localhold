title = "LocalHold gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Generated Git and Rust build data are scanned separately or reproducible"
paths = ['''(^|/)\.git/''', '''^\.cache/''', '''^\.cargo/''', '''^\.rustup/''', '''^target/''']

[[rules]]
id = "generic-api-key"

[[rules.allowlists]]
description = "Current and retired metadata migration sentinel comparisons are not credentials"
condition = "AND"
regexTarget = "line"
regexes = [
  '''^\s*let unresolved_scope = scope_key == V2_UNRESOLVED_SCOPE;\s*$''',
  '''^\s*let unresolved_scope = scope_key == UNRESOLVED_SCOPE;\s*$''',
]
paths = ['''^src/store/(admin|postgres)\.rs$''']
