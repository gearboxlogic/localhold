name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

jobs:
  check:
    name: Format + Clippy + Deny + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check publication hygiene
        run: ./script/check-publication-hygiene.sh

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/localhold/cargo/registry
            .cache/localhold/cargo/git
            target
          key: ${{ runner.os }}-rust-${{ hashFiles('Cargo.lock', 'mise.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - uses: jdx/mise-action@v2

      - name: Install nightly rustfmt
        run: mise x -- rustup toolchain install nightly -c rustfmt

      - name: Run CI gate
        run: mise x -- just check

  check-windows:
    name: Clippy + Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Preserve LF line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/localhold/cargo/registry
            .cache/localhold/cargo/git
            target
          key: ${{ runner.os }}-rust-${{ hashFiles('Cargo.lock', 'mise.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - uses: jdx/mise-action@v2

      - name: Clippy
        run: mise x -- just clippy

      - name: Test
        run: mise x -- just test
