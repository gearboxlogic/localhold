name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

permissions:
  contents: read

jobs:
  check:
    name: Format + Clippy + Deny + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/localhold/cargo/registry
            .cache/localhold/cargo/git
            target
          key: ${{ runner.os }}-rust-${{ hashFiles('Cargo.lock', 'mise.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.5

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly -c rustfmt

      - name: Run CI gate
        run: just check

      - name: Stage CPU installation
        run: ./script/install.sh --profile cpu --prefix "$RUNNER_TEMP/localhold"

      - name: Validate release metadata and archive tooling
        run: |
          python3 script/release.py validate
          tag="$(python3 script/release.py tag)"
          python3 script/package-release.py \
            --tag "$tag" \
            --target x86_64-unknown-linux-gnu \
            --binary target/release/hold \
            --format tar.zst \
            --output-dir "$RUNNER_TEMP/release"
          mkdir "$RUNNER_TEMP/extracted"
          tar --zstd -xf "$RUNNER_TEMP"/release/*.tar.zst -C "$RUNNER_TEMP/extracted"

      - name: Smoke installed and archived CPU binaries
        run: |
          "$RUNNER_TEMP/localhold/bin/hold" --version
          "$RUNNER_TEMP/localhold/bin/hold" --help
          archive="$(find "$RUNNER_TEMP/release" -maxdepth 1 -name '*.tar.zst' -print -quit)"
          archive_root="$(basename "$archive" .tar.zst)"
          archive_binary="$RUNNER_TEMP/extracted/$archive_root/bin/hold"
          "$archive_binary" --version
          "$archive_binary" --help

      - name: Build CUDA preview artifact
        run: just build-release-reranker-cuda

  check-windows:
    name: Clippy + Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Preserve LF line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/localhold/cargo/registry
            .cache/localhold/cargo/git
            target
          key: ${{ runner.os }}-rust-${{ hashFiles('Cargo.lock', 'mise.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.5

      - name: Clippy
        run: just clippy

      - name: Test
        run: just test

      - name: Build and package Windows preview archive
        run: |
          cargo build --release --locked --features reranker --target x86_64-pc-windows-msvc
          python script/release.py validate
          tag="$(python script/release.py tag)"
          python script/package-release.py \
            --tag "$tag" \
            --target x86_64-pc-windows-msvc \
            --binary target/x86_64-pc-windows-msvc/release/hold.exe \
            --format zip \
            --output-dir "$RUNNER_TEMP/release"

      - name: Smoke Windows preview archive
        shell: pwsh
        run: |
          $archive = Get-ChildItem "$env:RUNNER_TEMP/release/*.zip" | Select-Object -First 1
          Expand-Archive -Path $archive.FullName -DestinationPath "$env:RUNNER_TEMP/extracted"
          $archiveRoot = [IO.Path]::GetFileNameWithoutExtension($archive.Name)
          $binary = "$env:RUNNER_TEMP/extracted/$archiveRoot/bin/hold.exe"
          & $binary --version
          & $binary --help | Out-Null
