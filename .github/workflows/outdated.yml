name: Dependency Freshness

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

permissions:
  contents: read

jobs:
  outdated:
    name: cargo-outdated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/localhold/cargo/registry
            .cache/localhold/cargo/git
            target
          key: ${{ runner.os }}-rust-outdated-${{ hashFiles('Cargo.lock', 'mise.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-outdated-
            ${{ runner.os }}-rust-

      - uses: jdx/mise-action@v4

      - name: Check direct workspace dependencies for updates
        run: mise x -- just outdated
