name: Dependency Freshness

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

permissions:
  contents: read

jobs:
  outdated:
    name: cargo-outdated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/localhold/cargo/registry
            .cache/localhold/cargo/git
            target
          key: ${{ runner.os }}-rust-outdated-${{ hashFiles('Cargo.lock', 'mise.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-outdated-
            ${{ runner.os }}-rust-

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.5

      - name: Check direct workspace dependencies for updates
        run: mise x -- just outdated
