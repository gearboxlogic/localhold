name: Release

on:
  push:
    tags:
      - "v[0-9]*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  validate:
    name: Validate tag and tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require an annotated tag on a commit from main
        run: |
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = tag
          test "$(git rev-list -n 1 "$GITHUB_REF_NAME")" = "$(git rev-parse HEAD)"
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main

      - name: Validate release metadata
        run: python3 script/release.py validate "$GITHUB_REF_NAME"

      - name: Test release source
        run: cargo test --workspace --locked --features reranker

  linux:
    name: Linux x86_64 CPU archive
    needs: validate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build CPU release
        run: cargo build --release --locked --features reranker --target x86_64-unknown-linux-gnu

      - name: Package archive
        run: |
          python3 script/package-release.py \
            --tag "$GITHUB_REF_NAME" \
            --target x86_64-unknown-linux-gnu \
            --binary target/x86_64-unknown-linux-gnu/release/hold \
            --format tar.zst \
            --output-dir dist

      - name: Smoke extracted archive
        run: |
          mkdir extracted
          tar --zstd -xf dist/*.tar.zst -C extracted
          binary="extracted/localhold-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu/bin/hold"
          test "$("$binary" --version)" = "hold ${GITHUB_REF_NAME#v}"
          "$binary" --help >/dev/null

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-x86_64
          path: dist/*.tar.zst
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  windows:
    name: Windows x86_64 CPU archive
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Preserve LF line endings
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build CPU release
        shell: bash
        run: cargo build --release --locked --features reranker --target x86_64-pc-windows-msvc

      - name: Package archive
        shell: bash
        run: |
          python script/package-release.py \
            --tag "$GITHUB_REF_NAME" \
            --target x86_64-pc-windows-msvc \
            --binary target/x86_64-pc-windows-msvc/release/hold.exe \
            --format zip \
            --output-dir dist

      - name: Smoke extracted archive
        shell: pwsh
        run: |
          $archive = Get-ChildItem dist/*.zip | Select-Object -First 1
          Expand-Archive -Path $archive.FullName -DestinationPath extracted
          $binary = "extracted/localhold-$env:GITHUB_REF_NAME-x86_64-pc-windows-msvc/bin/hold.exe"
          $actual = & $binary --version
          $expected = "hold " + $env:GITHUB_REF_NAME.Substring(1)
          if ($actual -ne $expected) { throw "unexpected version: $actual" }
          & $binary --help | Out-Null

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows-x86_64
          path: dist/*.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  cuda:
    name: Linux x86_64 CUDA 12 archive and protected GPU gate
    needs: validate
    uses: ./.github/workflows/gpu-release-gate.yml
    with:
      release_tag: ${{ github.ref_name }}

  publish:
    name: Publish GitHub release
    needs: [linux, windows, cuda]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-linux-x86_64
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-windows-x86_64
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-linux-x86_64-cuda12
          path: dist

      - name: Create checksums and notes
        run: |
          cd dist
          sha256sum -- ./*.tar.zst ./*.zip > SHA256SUMS
          cd ..
          python3 script/release.py notes "$GITHUB_REF_NAME" --output release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.zst \
            dist/*.zip \
            dist/SHA256SUMS \
            --verify-tag \
            --title "LocalHold $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "${flags[@]}"
