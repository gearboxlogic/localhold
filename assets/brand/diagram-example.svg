<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-label="LocalHold architecture: MCP clients talk to hold, which keeps memories in a local store and calls an optional embedding endpoint" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace">
  <!-- External: the agent / MCP client -->
  <rect x="50" y="125" width="190" height="90" rx="4" fill="none" stroke="#7C8DA3" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="145" y="163" text-anchor="middle" font-size="16" fill="#7C8DA3">MCP CLIENT</text>
  <text x="145" y="187" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">AGENT / IDE</text>

  <!-- LocalHold server -->
  <rect x="340" y="105" width="230" height="130" rx="4" fill="#5C82B8" fill-opacity="0.07" stroke="#5C82B8" stroke-width="2"/>
  <text x="455" y="150" text-anchor="middle" font-size="18" fill="#5C82B8" font-weight="bold">hold</text>
  <text x="455" y="175" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">MCP SERVER</text>
  <text x="455" y="196" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">SEARCH · RERANK · POLICY</text>

  <!-- Store: crenellated, gold -->
  <path fill="#C89B3C" fill-opacity="0.07" stroke="#C89B3C" stroke-width="2" d="
    M672 148 V70 H694 V78 H716 V70 H738 V78 H760 V70 H782 V78 H804 V70 H826 V148 Z"/>
  <text x="749" y="112" text-anchor="middle" font-size="15" fill="#C89B3C">THE HOLD</text>
  <text x="749" y="133" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">SQLITE / POSTGRES</text>

  <!-- External: embedding endpoint -->
  <rect x="655" y="205" width="205" height="80" rx="4" fill="none" stroke="#7C8DA3" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="757" y="239" text-anchor="middle" font-size="14" fill="#7C8DA3">EMBEDDINGS</text>
  <text x="757" y="261" text-anchor="middle" font-size="11" fill="#7C8DA3" letter-spacing="1">OPENAI-COMPAT · OPTIONAL</text>

  <!-- Connectors -->
  <g stroke="#7C8DA3" stroke-width="2" fill="none">
    <path d="M240 170 H332"/>
    <path d="M324 163 L332 170 L324 177"/>
    <path d="M570 145 H630 V109 H664"/>
    <path d="M656 102 L664 109 L656 116"/>
    <path d="M455 235 V265 H647" stroke-dasharray="6 5"/>
    <path d="M639 258 L647 265 L639 272"/>
  </g>
  <text x="290" y="156" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">STDIO / HTTP</text>
  <text x="614" y="94" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">KEEPS</text>
  <text x="545" y="256" text-anchor="middle" font-size="12" fill="#7C8DA3" letter-spacing="1">POST /EMBEDDINGS</text>
</svg>
