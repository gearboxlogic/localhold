        L19.11 22.66 L8.70 24.43 L16.08 31.98 L18.93 31.05 L21.98 40.45 L19.13 41.37
        L17.60 51.82 L27.06 47.14 L27.06 44.14 L36.94 44.14 L36.94 47.14 L46.40 51.82
        L44.87 41.37 L42.02 40.45 L45.07 31.05 L47.92 31.98 L55.30 24.43 L44.89 22.66
        L43.13 25.08 Z
        M32.00 22.40 L22.87 29.03 L26.36 39.77 L30.60 39.77 L30.60 44.14 L33.40 44.14
        L33.40 39.77 L37.64 39.77 L41.13 29.03 Z"/>
      <path fill="none" stroke="#1F3A5F" stroke-width="1.1" stroke-linejoin="miter" d="
        M26.22 16.99 L19.51 21.87 M15.94 32.86 L18.51 40.75
        M45.49 40.75 L48.06 32.86 M44.49 21.87 L37.78 16.99"/>
      <circle fill="#C89B3C" cx="32" cy="32" r="3.4"/>
    </g>

    <!-- The Keep -->
    <g transform="translate(96 200) scale(2.6)">
      <path fill="#F2F4F6" fill-rule="evenodd" d="
        M14 56 L14 50 L18 50 L18 10 L25 10 L25 16 L28.5 16 L28.5 10 L35.5 10 L35.5 16
        L39 16 L39 10 L46 10 L46 50 L50 50 L50 56 Z
        M27 56 L27 42 A5 5 0 0 1 37 42 L37 56 Z"/>
    </g>

    <!-- Wordmark and brand line -->
    <text x="268" y="342" font-family="Iowan Old Style, Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
          font-size="112" font-weight="600" letter-spacing="1" fill="#F2F4F6">local<tspan fill="#C89B3C">hold</tspan></text>
    <text x="441" y="404" text-anchor="middle" font-family="-apple-system, Segoe UI, system-ui, sans-serif"
          font-size="33" fill="#93A2B3">Searchable context that stays yours.</text>

    <!-- Battlement rule -->
    <rect x="0" y="628" width="1280" height="12" fill="url(#crenel)"/>
