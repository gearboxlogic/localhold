<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="LocalHold — searchable context that stays yours">
  <defs>
    <pattern id="crenel" width="96" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 12 L0 4 L48 4 L48 12 Z" fill="#C89B3C"/>
      <rect y="9" width="96" height="3" fill="#C89B3C"/>
    </pattern>
    <clipPath id="frame"><rect width="1280" height="640"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1280" height="640" fill="#10161E"/>

    <!-- The Plan of the Hold -->
    <g transform="translate(1075 310) scale(12.5) translate(-32 -32)">
      <path fill="none" stroke="#27436B" stroke-width="0.9" d="
        M32 10 L40 18 L46 18 L46 24 L54 32 L46 40 L46 46 L40 46 L32 54
        L24 46 L18 46 L18 40 L10 32 L18 24 L18 18 L24 18 Z"/>
      <circle fill="#C89B3C" cx="32" cy="32" r="1.8"/>
    </g>

    <!-- The Keep -->
    <g transform="translate(96 200) scale(2.6)">
      <path fill="#F2F4F6" fill-rule="evenodd" d="
        M14 56 L14 50 L18 50 L18 10 L25 10 L25 16 L28.5 16 L28.5 10 L35.5 10 L35.5 16
        L39 16 L39 10 L46 10 L46 50 L50 50 L50 56 Z
        M27 56 L27 42 A5 5 0 0 1 37 42 L37 56 Z"/>
    </g>

    <!-- Wordmark and brand line -->
    <text x="268" y="342" font-family="Iowan Old Style, Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
          font-size="112" font-weight="600" letter-spacing="1" fill="#F2F4F6">local<tspan fill="#C89B3C">hold</tspan></text>
    <text x="273" y="404" font-family="-apple-system, Segoe UI, system-ui, sans-serif"
          font-size="33" fill="#93A2B3">Searchable context that stays yours.</text>

    <!-- Battlement rule -->
    <rect x="0" y="628" width="1280" height="12" fill="url(#crenel)"/>
  </g>
</svg>
