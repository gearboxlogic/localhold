[graph]
all-features = true

[advisories]
db-path = "target/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste is only pulled transitively by tokenizers in the optional reranker feature; no maintained replacement is selectable from this crate" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
private = { ignore = true }
exceptions = [
  { allow = ["Apache-2.0", "MIT"], crate = "ort" },
  { allow = ["Apache-2.0"], crate = "tokenizers" },
  { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs" },
]

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip = [
  { crate = "base64@0.13.1", reason = "Transitive via tokenizers/spm_precompiled; rest of the tree uses base64 0.22" },
  { crate = "darling@0.20.11", reason = "Transitive via tokenizers/derive_builder; rmcp uses darling 0.23" },
  { crate = "darling_core@0.20.11", reason = "Transitive via tokenizers/derive_builder; rmcp uses darling_core 0.23" },
  { crate = "darling_macro@0.20.11", reason = "Transitive via tokenizers/derive_builder; rmcp uses darling_macro 0.23" },
  { crate = "getrandom@0.2.17", reason = "Target-specific transitive via dirs-sys/redox_users; newer rand users pull getrandom 0.3+" },
  { crate = "getrandom@0.3.4", reason = "Transitive via tokenizers/proptest/ulid; rmcp/rand/tempfile use getrandom 0.4" },
  { crate = "hashlink@0.11.0", reason = "Transitive via sqlx-core 0.9; rusqlite 0.40 uses hashlink 0.12" },
  { crate = "hashbrown@0.16.1", reason = "Transitive via rusqlite/sqlx-core/hashlink; indexmap uses hashbrown 0.17" },
  { crate = "r-efi@5.3.0", reason = "Transitive via getrandom 0.3; getrandom 0.4 pulls r-efi 6" },
  { crate = "rand@0.9.4", reason = "Transitive via proptest/tokenizers/ulid; direct/rmcp uses rand 0.10" },
  { crate = "rand_core@0.9.5", reason = "Transitive via proptest/tokenizers/ulid/rand 0.9; direct/rmcp uses rand_core 0.10" },
  { crate = "wit-bindgen@0.51.0", reason = "Transitive via getrandom 0.4 wasip3 support; wasip2 pulls wit-bindgen 0.57" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
