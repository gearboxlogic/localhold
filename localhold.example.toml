# LocalHold -- example configuration
# Copy to ~/.config/localhold/localhold.toml (or the platform equivalent).
# Configuration files in the current working directory are not loaded implicitly.
# Values below document the complete configuration surface. Omitted fields use
# code defaults, and runtime settings can be overridden via LOCALHOLD_* variables.

[database]
backend = "sqlite" # "sqlite" or "postgres"

[database.sqlite]
path = "~/.local/share/localhold/localhold.db"

[database.postgres]
url = "postgres://localhold:localhold@localhost:5432/localhold"
max_connections = 5
auto_migrate = true
# Env: LOCALHOLD_DB_BACKEND, LOCALHOLD_DB_PATH,
#      LOCALHOLD_POSTGRES_URL, LOCALHOLD_POSTGRES_MAX_CONNECTIONS,
#      LOCALHOLD_POSTGRES_AUTO_MIGRATE

[embedding]
# Provider: "noop" (default, text-only search) or "openai_compatible".
provider = "noop"
dimensions = 768
# Env: LOCALHOLD_EMBEDDING_DIMENSIONS

[embedding.openai_compatible]
# Used when provider = "openai_compatible". Configure any compatible local or
# cloud endpoint. vLLM, llama.cpp, and Ollama are examples of local providers.
base_url = "http://127.0.0.1:8000/v1"
model = "nomic-embed-text"
# Optional bearer token. Omit or leave empty for local no-auth providers.
# api_key = ""
auth_mode = "bearer" # "bearer" or Azure-compatible "api_key"
send_dimensions = false # Enable only when the selected API/model accepts this field
health_check = "models" # "models" or "disabled" when GET /models is unavailable
allow_insecure_http = false # Non-loopback HTTP requires an explicit trusted-network opt-in
# Env: LOCALHOLD_EMBEDDING_BASE_URL, LOCALHOLD_EMBEDDING_MODEL,
#      LOCALHOLD_EMBEDDING_API_KEY, LOCALHOLD_EMBEDDING_AUTH_MODE,
#      LOCALHOLD_EMBEDDING_SEND_DIMENSIONS, LOCALHOLD_EMBEDDING_HEALTH_CHECK,
#      LOCALHOLD_EMBEDDING_ALLOW_INSECURE_HTTP

[server]
transport = "stdio"   # "stdio" or "http"
log_level = "info"    # trace, debug, info, warn, error
principal = "stdio"   # Trusted launch principal for stdio; empty = anonymous
anonymous_policy = "public_read_only" # "public_read_only", "deny_all", or "public_read_write"
host = "127.0.0.1"    # HTTP bind address (ignored for stdio)
port = 8080           # HTTP port (ignored for stdio)
path = "/mcp"         # Exact HTTP endpoint path (ignored for stdio)
http_auth_token = ""  # When set, every HTTP endpoint request must authenticate
http_principal_mode = "fixed" # "fixed" or "trusted_proxy"
http_principal = "http" # Identity assigned to every valid token in fixed mode
http_principal_header = "x-localhold-principal" # Trusted only in trusted_proxy mode
http_allowed_hosts = ["localhost", "127.0.0.1", "::1"] # Add proxy/public Host values explicitly
max_body_bytes = 8388608 # Max HTTP request body size; stdio is bounded by tool limits
http_max_sessions = 128 # Max retained stateful MCP sessions; clients should send DELETE when done
http_session_idle_timeout_secs = 900 # Reap abandoned sessions after 15 idle minutes
admin_tools_enabled = false # Explicitly expose privileged admin_* maintenance tools
# Env: LOCALHOLD_TRANSPORT, LOCALHOLD_LOG_LEVEL, LOCALHOLD_PRINCIPAL, LOCALHOLD_ANONYMOUS_POLICY,
#      LOCALHOLD_HTTP_HOST, LOCALHOLD_HTTP_PORT, LOCALHOLD_HTTP_PATH,
#      LOCALHOLD_HTTP_AUTH_TOKEN, LOCALHOLD_HTTP_PRINCIPAL_MODE,
#      LOCALHOLD_HTTP_PRINCIPAL, LOCALHOLD_HTTP_PRINCIPAL_HEADER,
#      LOCALHOLD_HTTP_ALLOWED_HOSTS, LOCALHOLD_HTTP_MAX_BODY_BYTES,
#      LOCALHOLD_HTTP_MAX_SESSIONS,
#      LOCALHOLD_HTTP_SESSION_IDLE_TIMEOUT_SECS,
#      LOCALHOLD_ADMIN_TOOLS_ENABLED

[limits]
max_search_limit = 50          # Max results per recall/search operation
max_candidate_pool_size = 1000 # Max first-stage candidates before reranking/scoring
max_list_limit = 500           # Max results per admin list call
max_content_length = 65536     # Max memory content size (bytes)
max_tags_per_memory = 50       # Max tags per memory
max_tag_length = 256           # Max length of a single tag (bytes)
max_batch_size = 100           # Max items per remember_many or handoff commit
max_reembed_limit = 100        # Max memories per admin_reembed bulk call
consolidation_neighbor_limit = 20  # ANN neighbors per memory during consolidation
embedding_timeout_secs = 30    # Timeout for embedding HTTP requests
max_concurrent_embedding_requests = 8 # Bound local load or hosted-provider pressure
embedding_batch_size = 32       # Texts per provider request for explicit bulk operations
embedding_max_retries = 2      # Retries after the initial retryable request failure
embedding_retry_initial_backoff_ms = 500 # Exponential backoff starting delay, with jitter
embedding_retry_max_backoff_ms = 30000 # Longest client/provider-directed delay to await
shutdown_timeout_secs = 10     # Graceful shutdown timeout for background tasks
max_entities_per_memory = 50   # Max entities per memory
max_entity_field_length = 256  # Max length of entity name/type (bytes)
max_top_tags_limit = 100       # Max tags in admin_count stats
max_history_limit = 500        # Max audit-history rows per admin_history call
# Env: LOCALHOLD_MAX_SEARCH_LIMIT, LOCALHOLD_MAX_CANDIDATE_POOL_SIZE,
#      LOCALHOLD_MAX_CONCURRENT_EMBEDDING_REQUESTS, LOCALHOLD_EMBEDDING_BATCH_SIZE,
#      LOCALHOLD_EMBEDDING_MAX_RETRIES,
#      LOCALHOLD_EMBEDDING_RETRY_INITIAL_BACKOFF_MS,
#      LOCALHOLD_EMBEDDING_RETRY_MAX_BACKOFF_MS, LOCALHOLD_MAX_LIST_LIMIT, etc.

[search]
# Default search mode when caller doesn't specify: auto, semantic, keyword, text
default_mode = "auto"

# Reciprocal Rank Fusion parameters (for hybrid search)
rrf_k = 60                     # RRF constant k (dampens rank sensitivity)
rrf_semantic_weight = 1.0      # Weight for semantic ANN results
rrf_keyword_weight = 1.0       # Weight for FTS5 keyword results
semantic_candidate_k = 100     # Candidate depth for semantic retrieval before fusion
keyword_candidate_k = 100      # Candidate depth for keyword retrieval before fusion
rerank_top_m = 50              # Top-N fused candidates kept for reranking / scoring

# Composite scoring weights (must sum to 100.0)
relevance_weight = 60.0        # Query relevance weight
importance_weight = 15.0       # Memory importance weight
freshness_weight = 10.0        # Content update freshness weight
activity_weight = 10.0         # Real-use activity weight (reads/cites/confirms, not impressions)
confidence_weight = 5.0        # Memory confidence weight
activity_half_life_hours = 720.0  # Activity decay half-life (720h = 30 days)
activity_saturation = 8.0      # Effective recent uses that saturate the activity boost
freshness_half_life_semantic_days = 180.0
freshness_half_life_episodic_days = 14.0
freshness_half_life_procedural_days = 365.0
relevance_floor = 0.15         # Query relevance below this is penalized
relevance_floor_penalty = 0.25 # Multiplier for below-floor results
superseded_penalty = 0.05      # Multiplier for superseded memories when included
# Env: LOCALHOLD_RRF_K, LOCALHOLD_RRF_SEMANTIC_WEIGHT, LOCALHOLD_RRF_KEYWORD_WEIGHT,
#      LOCALHOLD_DEFAULT_SEARCH_MODE, LOCALHOLD_SEMANTIC_CANDIDATE_K,
#      LOCALHOLD_KEYWORD_CANDIDATE_K, LOCALHOLD_RERANK_TOP_M,
#      LOCALHOLD_RELEVANCE_WEIGHT, LOCALHOLD_IMPORTANCE_WEIGHT,
#      LOCALHOLD_FRESHNESS_WEIGHT, LOCALHOLD_ACTIVITY_WEIGHT,
#      LOCALHOLD_CONFIDENCE_WEIGHT, LOCALHOLD_ACTIVITY_HALF_LIFE_HOURS,
#      LOCALHOLD_ACTIVITY_SATURATION,
#      LOCALHOLD_FRESHNESS_HALF_LIFE_SEMANTIC_DAYS,
#      LOCALHOLD_FRESHNESS_HALF_LIFE_EPISODIC_DAYS,
#      LOCALHOLD_FRESHNESS_HALF_LIFE_PROCEDURAL_DAYS,
#      LOCALHOLD_RELEVANCE_FLOOR, LOCALHOLD_RELEVANCE_FLOOR_PENALTY,
#      LOCALHOLD_SUPERSEDED_PENALTY

[search.reranker]
# Release builds ship with reranker support compiled in; runtime enablement is opt-in.
enabled = false
pool_size = 50                 # Deprecated compatibility shim; prefer search.rerank_top_m

# Built-in default model: setting only `enabled = true` is enough.
# These defaults are pinned in code for the builtin model.
model = "cross-encoder/ms-marco-MiniLM-L-6-v2"
revision = ""
model_path = ""               # Optional local ONNX path; takes precedence over download
model_sha256 = ""             # Optional override; required for custom auto-downloaded models
tokenizer_sha256 = ""         # Optional override; required for custom auto-downloaded models
blend_weight = 0.7
cache_dir = "~/.cache/localhold/models"

# Env: LOCALHOLD_RERANKER_ENABLED, LOCALHOLD_RERANKER_MODEL, LOCALHOLD_RERANKER_REVISION,
#      LOCALHOLD_RERANKER_MODEL_PATH, LOCALHOLD_RERANKER_MODEL_SHA256,
#      LOCALHOLD_RERANKER_TOKENIZER_SHA256, LOCALHOLD_RERANKER_BLEND_WEIGHT,
#      LOCALHOLD_RERANKER_CACHE_DIR, LOCALHOLD_RERANKER_POOL_SIZE

[search.duplicate_suppression]
enabled = false
lambda = 0.10                  # Near-duplicate penalty coefficient
# Env: LOCALHOLD_DUPLICATE_SUPPRESSION_ENABLED, LOCALHOLD_DUPLICATE_SUPPRESSION_LAMBDA
